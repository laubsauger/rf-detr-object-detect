<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RF-DETR Object Detection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { background: #111; color: #eee; font-family: system-ui, sans-serif; display: flex; flex-direction: column; }

    #topbar { display: flex; align-items: center; gap: 0.75rem; padding: 8px 12px; border-bottom: 1px solid #222; flex-wrap: wrap; flex-shrink: 0; }
    #topbar h1 { font-size: 1rem; font-weight: 600; margin-right: 0.5rem; white-space: nowrap; }
    #status { color: #aaa; font-size: 0.8rem; }
    #backend-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 0.7rem; font-weight: 600; margin-left: 4px; vertical-align: middle; }
    #backend-badge.webgpu { background: #2a7d2a; color: #fff; }
    #backend-badge.wasm { background: #b8860b; color: #fff; }
    #controls { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; margin-left: auto; }
    #controls label { font-size: 0.8rem; }
    #threshold { width: 80px; }
    button, select { padding: 0.3rem 0.5rem; border: 1px solid #444; background: #1a1a1a; color: #eee; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
    button:hover, select:hover { background: #2a2a2a; }
    button:disabled, select:disabled { opacity: 0.4; cursor: default; }

    #workspace { display: flex; flex: 1; min-height: 0; }

    #video-pane { flex: 1; position: relative; min-width: 0; display: flex; align-items: center; justify-content: center; background: #0a0a0a; }
    #video-pane.fullscreen { position: fixed; inset: 0; z-index: 100; }
    video { display: block; transform: scaleX(-1); width: 100%; height: 100%; object-fit: contain; }
    #overlay { position: absolute; pointer-events: none; }
    #stats { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.75); padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-variant-numeric: tabular-nums; z-index: 2; }

    #video-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; background: #0a0a0a; z-index: 3; }
    #video-placeholder.hidden { display: none; }
    #video-placeholder .placeholder-icon { font-size: 4rem; opacity: 0.2; }
    #video-placeholder .placeholder-text { color: #555; font-size: 0.9rem; }
    #startBtnLarge { padding: 0.8rem 2rem; font-size: 1rem; border: 1px solid #555; background: #222; color: #eee; border-radius: 8px; cursor: pointer; }
    #startBtnLarge:hover { background: #333; }
    #startBtnLarge:disabled { opacity: 0.4; cursor: default; }

    #progress-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: #222; z-index: 5; display: none; }
    #progress-bar.active { display: block; }
    #progress-fill { height: 100%; background: #4a9eff; width: 0%; transition: width 0.2s; }

    #segment-pane { width: 50%; max-width: 50%; flex-shrink: 0; border-left: 1px solid #222; overflow-y: auto; padding: 8px; scrollbar-width: thin; scrollbar-color: #333 transparent; display: none; }
    #segment-pane.visible { display: block; }

    #segment-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }

    .segment { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; }
    .segment canvas { width: 100%; display: block; background: repeating-conic-gradient(#1e1e1e 0% 25%, #252525 0% 50%) 50% / 10px 10px; }
    .segment .seg-label { font-size: 0.7rem; padding: 4px 6px; font-variant-numeric: tabular-nums; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>
  <div id="topbar">
    <h1>RF-DETR</h1>
    <span id="status">Loading...<span id="backend-badge"></span></span>
    <div id="controls">
      <label>Model: <select id="modelSelect" disabled></select></label>
      <label>Backend: <select id="backendSelect">
        <option value="auto">Auto (WebGPU &gt; WASM)</option>
        <option value="webgpu">WebGPU</option>
        <option value="wasm">WASM</option>
      </select></label>
      <button id="startBtn" disabled>Start Camera</button>
      <label>Threshold: <input type="range" id="threshold" min="0.1" max="0.9" step="0.05" value="0.5"><span id="threshVal">0.50</span></label>
      <label><input type="checkbox" id="showSegments"> Segments</label>
      <button id="fullscreenBtn">Fullscreen</button>
    </div>
  </div>
  <div id="workspace">
    <div id="video-pane">
      <div id="video-placeholder">
        <div class="placeholder-icon">&#x1F4F7;</div>
        <div class="placeholder-text">Select a model, then start the camera</div>
        <button id="startBtnLarge" disabled>Start Camera</button>
      </div>
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <div id="stats"></div>
      <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>
    <div id="segment-pane">
      <div id="segment-grid"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
