<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RF-DETR Object Detection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { background: #0a0a0a; color: #eee; font-family: system-ui, sans-serif; display: flex; }

    #workspace { display: flex; flex: 1; min-height: 0; width: 100%; }

    #video-pane { flex: 1; position: relative; min-width: 0; display: flex; align-items: center; justify-content: center; background: #0a0a0a; overflow: hidden; }
    video { display: block; transform: scaleX(-1); width: 100%; height: 100%; object-fit: contain; }
    #overlay { position: absolute; pointer-events: none; }
    #stats { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.75); padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-variant-numeric: tabular-nums; z-index: 2; color: #eee; }

    /* Floating control panel */
    #panel-toggle { position: absolute; top: 8px; left: 8px; z-index: 20; width: 32px; height: 32px; border: 1px solid #555; background: rgba(0,0,0,0.6); color: #eee; border-radius: 6px; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
    #panel-toggle:hover { background: rgba(40,40,40,0.8); }

    #control-panel { position: absolute; top: 8px; left: 8px; z-index: 15; background: rgba(15,15,15,0.92); border: 1px solid #333; border-radius: 8px; padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; min-width: 220px; max-width: 260px; backdrop-filter: blur(12px); font-size: 0.8rem; /* for absolute close btn */ }
    #control-panel.collapsed { display: none; }
    #control-panel .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
    #control-panel .panel-header h2 { font-size: 0.9rem; font-weight: 600; white-space: nowrap; margin-right: auto; }
    #control-panel .panel-close { background: none; border: none; color: #666; cursor: pointer; font-size: 1.3rem; padding: 0; line-height: 1; margin-left: 12px; }
    #control-panel .panel-close:hover { color: #eee; }
    #control-panel label { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; }
    #control-panel select, #control-panel button { width: 100%; padding: 0.3rem 0.5rem; border: 1px solid #444; background: #1a1a1a; color: #eee; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
    #control-panel select:hover, #control-panel button:hover { background: #2a2a2a; }
    #control-panel button:disabled, #control-panel select:disabled { opacity: 0.4; cursor: default; }
    #control-panel input[type="range"] { flex: 1; min-width: 60px; }
    #control-panel .ctrl-row { display: flex; align-items: center; gap: 6px; }
    #control-panel .ctrl-val { min-width: 28px; text-align: right; font-variant-numeric: tabular-nums; font-size: 0.75rem; color: #aaa; }
    #control-panel .ctrl-group { border-top: 1px solid #222; padding-top: 6px; display: flex; flex-direction: column; gap: 6px; }
    #control-panel .status-line { color: #888; font-size: 0.75rem; }
    #backend-badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 0.65rem; font-weight: 600; margin-left: 3px; vertical-align: middle; }
    #backend-badge.webgpu { background: #2a7d2a; color: #fff; }
    #backend-badge.wasm { background: #b8860b; color: #fff; }

    /* Placeholder */
    #video-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; background: #0a0a0a; z-index: 3; }
    #video-placeholder.hidden { display: none; }
    #video-placeholder .placeholder-icon { font-size: 4rem; opacity: 0.15; }
    #video-placeholder .placeholder-text { color: #444; font-size: 0.9rem; }
    #startBtnLarge { padding: 0.8rem 2rem; font-size: 1rem; border: 1px solid #555; background: #1a1a1a; color: #eee; border-radius: 8px; cursor: pointer; }
    #startBtnLarge:hover { background: #2a2a2a; }
    #startBtnLarge:disabled { opacity: 0.4; cursor: default; }

    /* Progress */
    #progress-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: #222; z-index: 5; display: none; }
    #progress-bar.active { display: block; }
    #progress-fill { height: 100%; background: #4a9eff; width: 0%; transition: width 0.2s; }

    /* Segment sidebar */
    #segment-pane { width: 50%; max-width: 50%; flex-shrink: 0; border-left: 1px solid #222; overflow-y: auto; padding: 8px; scrollbar-width: thin; scrollbar-color: #333 transparent; display: none; background: #111; }
    #segment-pane.visible { display: block; }
    #segment-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
    .segment { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; }
    .segment canvas { width: 100%; display: block; background: repeating-conic-gradient(#1e1e1e 0% 25%, #252525 0% 50%) 50% / 10px 10px; }
    .segment .seg-label { font-size: 0.7rem; padding: 4px 6px; font-variant-numeric: tabular-nums; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>
  <div id="workspace">
    <div id="video-pane">
      <div id="video-placeholder">
        <div class="placeholder-icon">&#x1F4F7;</div>
        <div class="placeholder-text">Select a model, then start the camera</div>
        <button id="startBtnLarge" disabled>Start Camera</button>
      </div>
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <div id="stats"></div>
      <div id="progress-bar"><div id="progress-fill"></div></div>

      <button id="panel-toggle" title="Settings">&#x2699;</button>
      <div id="control-panel">
        <div class="panel-header">
          <h2>RF-DETR</h2>
          <button class="panel-close" id="panelClose" title="Close">&times;</button>
        </div>
        <div class="status-line" id="status">Loading...<span id="backend-badge"></span></div>

        <label>Model <select id="modelSelect" disabled></select></label>
        <label>Backend <select id="backendSelect">
          <option value="auto">Auto (WebGPU &gt; WASM)</option>
          <option value="webgpu">WebGPU</option>
          <option value="wasm">WASM</option>
        </select></label>
        <button id="startBtn" disabled>Start Camera</button>

        <div class="ctrl-group">
          <div class="ctrl-row"><span>Confidence</span><input type="range" id="threshold" min="0.1" max="0.9" step="0.05" value="0.5"><span class="ctrl-val" id="threshVal">0.50</span></div>
          <div class="ctrl-row"><span>Mask fill</span><input type="range" id="maskOpacity" min="0" max="1" step="0.05" value="0.4"><span class="ctrl-val" id="maskOpacityVal">0.40</span></div>
          <div class="ctrl-row"><span>Outline</span><input type="range" id="outlineOpacity" min="0" max="1" step="0.05" value="0.85"><span class="ctrl-val" id="outlineOpacityVal">0.85</span></div>
        </div>

        <div class="ctrl-group">
          <label><input type="checkbox" id="showSegments"> Show segment sidebar</label>
          <button id="fullscreenBtn">Fullscreen</button>
        </div>
      </div>
    </div>
    <div id="segment-pane">
      <div id="segment-grid"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
