<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RF-DETR Object Detection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #eee; font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    h1 { margin: 1rem 0 0.5rem; font-size: 1.3rem; font-weight: 500; }
    #status { color: #aaa; font-size: 0.85rem; margin-bottom: 0.5rem; }
    #main { display: flex; gap: 12px; align-items: flex-start; }
    #container { position: relative; display: inline-block; resize: both; overflow: hidden; border: 1px solid #333; border-radius: 8px; flex-shrink: 0; }
    #container.fullscreen { resize: none; border: none; border-radius: 0; width: 100vw !important; height: 100vh !important; }
    video { display: block; border-radius: 8px; transform: scaleX(-1); width: 100%; height: 100%; object-fit: contain; }
    #overlay { position: absolute; top: 0; left: 0; pointer-events: none; width: 100%; height: 100%; }
    #stats { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.7); padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-variant-numeric: tabular-nums; }
    #backend-badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600; margin-left: 0.5rem; vertical-align: middle; }
    #backend-badge.webgpu { background: #2a7d2a; color: #fff; }
    #backend-badge.wasm { background: #b8860b; color: #fff; }
    #controls { margin: 0.75rem 0; display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; justify-content: center; }
    #controls label { font-size: 0.85rem; }
    #threshold { width: 120px; }
    button, select { padding: 0.4rem 0.6rem; border: 1px solid #555; background: #222; color: #eee; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    button:hover, select:hover { background: #333; }
    button:disabled, select:disabled { opacity: 0.5; cursor: default; }
    #sidebar { width: 180px; max-height: 80vh; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; scrollbar-width: thin; scrollbar-color: #444 transparent; }
    #sidebar:empty::after { content: "Segments will appear here"; color: #555; font-size: 0.75rem; text-align: center; padding: 1rem 0.5rem; }
    .segment { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 4px; display: flex; flex-direction: column; align-items: center; }
    .segment canvas { width: 100%; aspect-ratio: auto; border-radius: 4px; background: repeating-conic-gradient(#222 0% 25%, #2a2a2a 0% 50%) 50% / 12px 12px; }
    .segment .seg-label { font-size: 0.7rem; margin-top: 3px; text-align: center; font-variant-numeric: tabular-nums; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
  </style>
</head>
<body>
  <h1>RF-DETR &mdash; Browser Detection</h1>
  <div id="status">Loading...<span id="backend-badge"></span></div>
  <div id="controls">
    <label>Model: <select id="modelSelect" disabled></select></label>
    <label>Backend: <select id="backendSelect">
      <option value="auto">Auto (WebGPU &gt; WASM)</option>
      <option value="webgpu">WebGPU</option>
      <option value="wasm">WASM</option>
    </select></label>
    <button id="startBtn" disabled>Start Camera</button>
    <label>Threshold: <input type="range" id="threshold" min="0.1" max="0.9" step="0.05" value="0.5"><span id="threshVal">0.50</span></label>
    <button id="fullscreenBtn">Fullscreen</button>
  </div>
  <div id="main">
    <div id="container">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <div id="stats"></div>
    </div>
    <div id="sidebar"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
